precision: bf16-mixed
device: auto
num_workers: 8
num_threads: 1
train:
  train_from_scratch: true
  training_data:
    - synth_arxiv_train_9k.lst
  evaluation_data:
    - synth_arxiv_val_1k.lst
  checkpoint_path: /home/mittagessen/foo
  pl_logger: wandb

  # text transforms
  normalization: NFD
  normalize_whitespace: true
  prompt_mode: both

  # model variant
  model_variant: base_multi_scale

  # training hyperparameters for synthetic convergence checks
  optimizer: AdamW
  epochs: 8
  lrate: 5e-4
  lr_pretrained_mult: 0.1
  weight_decay: 1e-5
  schedule: cosine
  cos_t_max: 8
  cos_min_lr: 5e-6
  warmup: 500
  augment: false
  prompt_corruption: false
  batch_size: 16
  val_batch_size: 32
  accumulate_grad_batches: 4
  noisy_teacher_forcing: 0.0
  noisy_teacher_forcing_warmup: 0
  label_smoothing: 0.0
