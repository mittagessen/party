precision: bf16-mixed
device: auto
num_workers: 4
num_threads: 1
train:
  train_from_scratch: true
  training_data:
    - /home/mittagessen/party_dataset/synth_arxiv_train_9k.lst
  evaluation_data:
    - /home/mittagessen/party_dataset/synth_arxiv_val_1k.lst
  checkpoint_path: /home/mittagessen/party_models/regression_additive_multiscale_regularized
  pl_logger: wandb

  normalization: NFD
  normalize_whitespace: true
  prompt_mode: both

  # Step 4: full regularized additive recipe.
  encoder_out_indices: [1, 2, 3]
  adapter_num_layers: 1
  adapter_num_heads: 8
  adapter_ds_factors: [4, 2, 1]

  optimizer: AdamW
  epochs: 8
  lrate: 5e-4
  lr_pretrained_mult: 0.1
  weight_decay: 5e-5
  schedule: cosine
  cos_t_max: 8
  cos_min_lr: 5e-6
  warmup: 500

  noisy_teacher_forcing: 0.05
  noisy_teacher_forcing_warmup: 1000
  label_smoothing: 0.1
  augment: true

  batch_size: 16
  val_batch_size: 32
  accumulate_grad_batches: 4
