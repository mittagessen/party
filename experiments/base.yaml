precision: bf16-mixed
device: auto
num_workers: 4  # because of page-wise sampling it is not necessary to scale worker
            # number with batch size.
num_threads: 1
train:
  model_variant: base
  # training data manifests
  training_data: 
    - /home/mittagessen/party_dataset/train.lst
    - /home/mittagessen/party_dataset/train_2.lst
  evaluation_data: 
    - /home/mittagessen/party_dataset/val.lst
  # directory to save checkpoints in
  checkpoint_path: /home/mittagessen/party_models
  # text transforms
  normalization: NFD
  normalize_whitespace: true
  # whether to train on `boxes`, `curves`, or `both` line prompt types
  prompt_mode: both
  # base configuration of training epochs and LR schedule
  epochs: 32
  lrate: 5e-4
  schedule: cosine 
  cos_t_max: 32
  cos_min_lr: 5e-6
  warmup: 1000
  augment: true
  # effective batch size params
  batch_size: 16
  val_batch_size: 32
  accumulate_grad_batches: 4
