precision: bf16-mixed
device: auto
num_workers: 8
num_threads: 1
train:
  train_from_scratch: true
  training_data:
    - synth_arxiv_train_9k.lst
  evaluation_data:
    - synth_arxiv_val_1k.lst
  checkpoint_path: /home/mittagessen/party_models/regression_locator_reader_main_components
  pl_logger: wandb

  # text transforms
  normalization: NFD
  normalize_whitespace: true
  prompt_mode: both

  # locator-reader visual conditioner setup (single encoder stage for comparability)
  encoder_name: convnextv2_base.fcmae_ft_in22k_in1k
  encoder_out_indices: [2]
  decoder_name: mittagessen/bytellama-40m-oscar
  fusion_interval: 3
  adapter_num_layers: 4
  adapter_num_heads: 8
  adapter_ds_factors: [1]
  locator_num_tokens: 8
  reader_num_tokens: 128
  global_num_tokens: 8
  conditioner_num_rounds: 2
  prompt_num_layers: 2
  prompt_num_heads: 8

  # training hyperparameters for synthetic convergence checks
  optimizer: AdamW
  epochs: 8
  lrate: 5e-4
  lr_pretrained_mult: 0.1
  weight_decay: 1e-5
  schedule: cosine
  cos_t_max: 8
  cos_min_lr: 5e-6
  warmup: 500
  augment: true
  batch_size: 16
  val_batch_size: 32
  accumulate_grad_batches: 4
  noisy_teacher_forcing: 0.0
  noisy_teacher_forcing_warmup: 0
  label_smoothing: 0.0
